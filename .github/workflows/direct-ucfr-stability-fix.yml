name: Direct UČFR stability fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/direct-ucfr-stability-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply direct source changes
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          root = Path('.')
          main_path = root / 'src/main.js'
          main = main_path.read_text(encoding='utf-8')

          for old in ['/assets/ucfr-logo.svg', '/assets/ucfr-logo.png?v=5', '/assets/ucfr-logo.png?v=6']:
              main = main.replace(old, '/assets/ucfr-logo.png?v=7')

          old_brand = '''          <strong>UČFR</strong>
          <span>
            ${
              lang === 'cs'
                ? 'Unie českých fotbalových rozhodčích'
                : 'Union of Czech Football Referees'
            }
          </span>'''
          new_brand = '''          <strong class="ucfr-full-brand-name">
            ${lang === 'cs' ? 'Unie českých fotbalových rozhodčích' : 'Union of Czech Football Referees'}
          </strong>'''
          if old_brand in main:
              main = main.replace(old_brand, new_brand, 1)

          lang_button = '''        <button class="lang" id="langBtn" type="button">
          ${flag()}
        </button>'''
          theme_button = lang_button + '''

        <button
          class="theme-toggle-btn site-theme-toggle"
          id="siteThemeToggle"
          data-theme-toggle
          type="button"
          aria-label="Přepnout na tmavý režim"
        >
          <span class="theme-toggle-icon" aria-hidden="true">☾</span>
        </button>'''
          if 'id="siteThemeToggle"' not in main and lang_button in main:
              main = main.replace(lang_button, theme_button, 1)

          main = main.replace("'PETR TLUSTOHLAVY'", "'PETR ROZHODČÍ'")
          main = main.replace('IČO: bude doplněno', 'IČO: 24417513')

          video_url = 'https://youtube.com/@refacademy?si=nvtPkzVsGe30KaRA'
          if video_url not in main:
              marker = '''          <article class="test-mode-card">
            <div class="test-mode-icon">📊</div>'''
              video = '''          <article class="test-mode-card ucfr-video-analysis-card">
            <div class="test-mode-icon">🎥</div>
            <h3>${lang === 'cs' ? 'Video analýzy' : 'Video analysis'}</h3>
            <p>${lang === 'cs' ? 'Rozbory herních situací a rozhodnutí rozhodčích.' : 'Breakdowns of match situations and refereeing decisions.'}</p>
            <a class="secondary dark video-analysis-link" href="https://youtube.com/@refacademy?si=nvtPkzVsGe30KaRA" target="_blank" rel="noopener noreferrer">
              ${lang === 'cs' ? 'Otevřít Ref Academy' : 'Open Ref Academy'}
            </a>
          </article>

'''
              if marker not in main:
                  raise SystemExit('Could not find video card insertion point')
              main = main.replace(marker, video + marker, 1)

          documents_pattern = re.compile(
              r'    <section class="documents-section" id="documents">.*?    </section>\n\n    <footer id="contact">',
              re.S,
          )
          documents = '''    <section class="documents-section" id="documents">
      <div>
        <span class="section-label">DOCUMENTS</span>
        <h2>${lang === 'cs' ? 'Oficiální dokumenty UČFR' : 'Official UČFR documents'}</h2>
        <p>${lang === 'cs' ? 'Ověřené údaje spolku a veřejné listiny vedené Ministerstvem spravedlnosti České republiky.' : 'Verified association details and public documents maintained by the Ministry of Justice of the Czech Republic.'}</p>
      </div>
      <div class="document-links">
        <a class="document-link" href="https://or.justice.cz/ias/ui/rejstrik-firma.vysledky?subjektId=1306981&typ=PLATNY" target="_blank" rel="noopener noreferrer">
          📄 ${lang === 'cs' ? 'Veřejný rejstřík spolku' : 'Public register entry'}
        </a>
        <a class="document-link" href="https://or.justice.cz/ias/ui/vypis-sl-detail?dokument=89888399&subjektId=1306981&spis=1476835" target="_blank" rel="noopener noreferrer">
          📄 ${lang === 'cs' ? 'Sbírka listin – dokument 89888399' : 'Collection of documents – document 89888399'}
        </a>
      </div>
    </section>

    <footer id="contact">'''
          main, count = documents_pattern.subn(documents, main, count=1)
          if count != 1:
              raise SystemExit(f'Documents replacement count was {count}')

          main_path.write_text(main, encoding='utf-8')

          index_path = root / 'index.html'
          index = index_path.read_text(encoding='utf-8')
          index = re.sub(r'/assets/ucfr-logo\.(?:svg|png)(?:\?v=\d+)?', '/assets/ucfr-logo.png?v=7', index)
          index = index.replace('href="/theme-toggle.css"', 'href="/theme-toggle.css?v=4"')
          index = index.replace('src="/theme-toggle.js"', 'src="/theme-toggle.js?v=4"')
          index = re.sub(r'\n\s*<script src="/ucfr-details\.js\?v=\d+" defer></script>', '', index)
          index = re.sub(r'\n\s*<script src="/ucfr-brand\.js\?v=\d+" defer></script>', '', index)
          index_path.write_text(index, encoding='utf-8')

          ci_path = root / '.github/workflows/main-build-check.yml'
          if ci_path.exists():
              ci = ci_path.read_text(encoding='utf-8')
              ci = re.sub(r'^\s*node --check public/ucfr-(?:details|brand)\.js\s*\n', '', ci, flags=re.M)
              ci_path.write_text(ci, encoding='utf-8')

          for obsolete in [root / 'public/ucfr-details.js', root / 'public/ucfr-brand.js']:
              obsolete.unlink(missing_ok=True)
          PY

      - name: Validate JavaScript and build
        run: |
          node --check src/main.js
          node --check public/theme-toggle.js
          npm ci
          npm run test:cards
          npm run build

      - name: Commit direct fix
        shell: bash
        run: |
          rm -f .github/workflows/direct-ucfr-stability-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove runtime DOM patching and stabilize UČFR site" || exit 0
          git push
