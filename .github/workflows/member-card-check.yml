name: Member card checks

on:
  pull_request:
    paths:
      - 'public/cards/**'
      - 'public/member-card-system.*'
      - 'tests/member-card-template.test.mjs'
      - 'dashboard.html'
      - 'index.html'
      - 'package.json'
      - '.github/workflows/member-card-check.yml'
  push:
    branches:
      - feature/member-cards-v1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate member card files
        run: npm run test:cards
      - name: Build web application
        run: npm run build
