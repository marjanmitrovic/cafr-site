name: Finalize requested UČFR details

on:
  push:
    branches: [main]
    paths: [.github/workflows/finalize-ucfr-request.yml]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write requested details into permanent source
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          root = Path('.')

          server_path = root / 'server/server.js'
          server = server_path.read_text(encoding='utf-8')
          if "'unierozhodcich@gmail.com'" not in server:
              server = server.replace(
                  "  'marapleskac@gmail.com',\n",
                  "  'marapleskac@gmail.com',\n  'unierozhodcich@gmail.com',\n",
                  1,
              )
          server = server.replace(
              "process.env.ASSOCIATION_ICO || 'bude doplněno'",
              "process.env.ASSOCIATION_ICO || '24417513'",
          )
          server_path.write_text(server, encoding='utf-8')

          main_path = root / 'src/main.js'
          main = main_path.read_text(encoding='utf-8')
          main = main.replace("'PETR TLUSTOHLAVY'", "'PETR ROZHODČÍ'")
          main = main.replace('IČO: bude doplněno', 'IČO: 24417513')

          video_url = 'https://youtube.com/@refacademy?si=nvtPkzVsGe30KaRA'
          if video_url not in main:
              marker = '''          <article class="test-mode-card">
            <div class="test-mode-icon">📊</div>'''
              card = '''          <article class="test-mode-card">
            <div class="test-mode-icon">🎥</div>
            <h3>${lang === 'cs' ? 'Video analýzy' : 'Video analysis'}</h3>
            <p>${lang === 'cs' ? 'Rozbory herních situací a rozhodnutí rozhodčích.' : 'Breakdowns of match situations and refereeing decisions.'}</p>
            <a class="secondary dark video-analysis-link" href="https://youtube.com/@refacademy?si=nvtPkzVsGe30KaRA" target="_blank" rel="noopener noreferrer">
              ${lang === 'cs' ? 'Otevřít Ref Academy' : 'Open Ref Academy'}
            </a>
          </article>

'''
              if marker not in main:
                  raise SystemExit('Video insertion marker missing')
              main = main.replace(marker, card + marker, 1)

          pattern = re.compile(
              r'    <section class="documents-section" id="documents">.*?    </section>\n\n    <footer id="contact">',
              re.S,
          )
          replacement = '''    <section class="documents-section" id="documents">
      <div>
        <span class="section-label">DOCUMENTS</span>
        <h2>${lang === 'cs' ? 'Oficiální dokumenty UČFR' : 'Official UČFR documents'}</h2>
        <p>${lang === 'cs' ? 'Ověřené údaje spolku a veřejné listiny vedené Ministerstvem spravedlnosti České republiky.' : 'Verified association details and public documents maintained by the Ministry of Justice of the Czech Republic.'}</p>
      </div>
      <div class="document-links">
        <a class="document-link" href="https://or.justice.cz/ias/ui/rejstrik-firma.vysledky?subjektId=1306981&typ=PLATNY" target="_blank" rel="noopener noreferrer">
          📄 ${lang === 'cs' ? 'Veřejný rejstřík spolku' : 'Public register entry'}
        </a>
        <a class="document-link" href="https://or.justice.cz/ias/ui/vypis-sl-detail?dokument=89888399&subjektId=1306981&spis=1476835" target="_blank" rel="noopener noreferrer">
          📄 ${lang === 'cs' ? 'Sbírka listin – dokument 89888399' : 'Collection of documents – document 89888399'}
        </a>
      </div>
    </section>

    <footer id="contact">'''
          main, count = pattern.subn(replacement, main, count=1)
          if count != 1:
              raise SystemExit(f'Documents replacement failed: {count}')
          main_path.write_text(main, encoding='utf-8')

          style_path = root / 'src/style.css'
          style = style_path.read_text(encoding='utf-8')
          if '.video-analysis-link{' not in style and '.video-analysis-link {' not in style:
              style += '\n.document-links{display:flex;flex-direction:column;gap:12px;min-width:min(100%,430px)}\n.document-links .document-link{justify-content:flex-start;white-space:normal}\n.video-analysis-link{display:inline-flex;align-items:center;justify-content:center;margin-top:10px;text-decoration:none}\n@media(max-width:720px){.document-links{width:100%;min-width:0}.document-links .document-link{width:100%;justify-content:center}}\n'
          style_path.write_text(style, encoding='utf-8')

          index_path = root / 'index.html'
          index = index_path.read_text(encoding='utf-8')
          index = re.sub(r'^\s*<link rel="stylesheet" href="/ucfr-details\.css\?v=1">\s*\n', '', index, flags=re.M)
          index = re.sub(r'^\s*<script src="/ucfr-details\.js\?v=1" defer></script>\s*\n', '', index, flags=re.M)
          index_path.write_text(index, encoding='utf-8')

          package_path = root / 'package.json'
          package = json.loads(package_path.read_text(encoding='utf-8'))
          package['scripts']['dev:api'] = 'node --env-file=.env --watch server/server.js'
          package['scripts']['start:production'] = 'node server/server.js'
          package['scripts']['start:api'] = 'node --env-file=.env server/server.js'
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          ci_path = root / '.github/workflows/main-build-check.yml'
          ci = ci_path.read_text(encoding='utf-8')
          ci = ci.replace('          node --check public/ucfr-details.js\n', '')
          ci = ci.replace('          node --check server/ucfr-details-preload.js\n', '')
          ci_path.write_text(ci, encoding='utf-8')

          for relative in ('public/ucfr-details.js', 'public/ucfr-details.css', 'server/ucfr-details-preload.js'):
              path = root / relative
              if path.exists():
                  path.unlink()

          assert "'unierozhodcich@gmail.com'" in server_path.read_text(encoding='utf-8')
          assert "'PETR ROZHODČÍ'" in main_path.read_text(encoding='utf-8')
          assert 'Stanovy_CAFR_navrh.pdf' not in main_path.read_text(encoding='utf-8')
          assert '{{LOGO}}' in (root / 'public/cards/card-template.svg').read_text(encoding='utf-8')
          assert 'viewBox="0 0 600 800"' in (root / 'public/assets/ucfr-logo.svg').read_text(encoding='utf-8')
          PY

      - name: Parse-check permanent JavaScript
        run: |
          node --check server/server.js
          node --check src/main.js
          node --check public/member-card-system.js
          node --check public/simple-member-card.js

      - name: Commit permanent source
        shell: bash
        run: |
          rm -f .github/workflows/finalize-ucfr-request.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize UČFR details in permanent source"
          git push
