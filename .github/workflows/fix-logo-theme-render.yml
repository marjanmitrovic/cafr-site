name: Fix UČFR logo, themes and Render name

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-logo-theme-render.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install official PNG crest
        shell: bash
        run: |
          mkdir -p public/assets
          cat > /tmp/ucfr-logo.b64 <<'B64'
          
          B64
          base64 -d /tmp/ucfr-logo.b64 > public/assets/ucfr-logo.png

      - name: Apply source fixes
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          root = Path('.')
          logo = '/assets/ucfr-logo.png?v=5'

          for path in root.rglob('*'):
              if not path.is_file() or '.git' in path.parts or path.suffix.lower() not in {'.html', '.js', '.json', '.webmanifest', '.xml', '.md'}:
                  continue
              text = path.read_text(encoding='utf-8', errors='ignore')
              original = text
              text = re.sub(r'/assets/ucfr-logo\.(?:svg|png)(?:\?v=\d+)?', logo, text)
              text = text.replace('https://cafr-site.onrender.com', 'https://ucfr.onrender.com')
              if text != original:
                  path.write_text(text, encoding='utf-8')

          main = root / 'src/main.js'
          text = main.read_text(encoding='utf-8')
          text = re.sub(
              r'<strong>UČFR</strong>\s*<span>.*?</span>',
              '<strong class="ucfr-full-brand-name">Unie českých fotbalových rozhodčích</strong>',
              text,
              count=1,
              flags=re.S,
          )
          main.write_text(text, encoding='utf-8')

          render = root / 'render.yaml'
          text = render.read_text(encoding='utf-8')
          text = re.sub(r'(?m)^(\s*name:\s*)cafr-site\s*$', r'\1ucfr', text, count=1)
          text = re.sub(
              r'(?m)^(\s*- key: WEB_ORIGIN\s*)\n\s*sync: false\s*$',
              r'\1\n        value: https://ucfr.onrender.com',
              text,
              count=1,
          )
          render.write_text(text, encoding='utf-8')

          manifest = root / 'public/site.webmanifest'
          data = json.loads(manifest.read_text(encoding='utf-8'))
          data['name'] = 'Unie českých fotbalových rozhodčích'
          data['short_name'] = 'UČFR'
          data['background_color'] = '#f4f7fb'
          data['theme_color'] = '#0b2a55'
          data['icons'] = [{
              'src': logo,
              'sizes': '192x247',
              'type': 'image/png',
              'purpose': 'any'
          }]
          manifest.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          index = root / 'index.html'
          text = index.read_text(encoding='utf-8')
          text = text.replace('/theme-toggle.css"', '/theme-toggle.css?v=5"')
          text = text.replace('/theme-toggle.js"', '/theme-toggle.js?v=5"')
          text = text.replace('/ucfr-details.css?v=2', '/ucfr-details.css?v=5')
          text = text.replace('/ucfr-details.js?v=2', '/ucfr-details.js?v=5')
          text = text.replace('/ucfr-brand.js?v=3', '/ucfr-brand.js?v=5')
          index.write_text(text, encoding='utf-8')
          PY

      - name: Replace safe logo loader
        shell: bash
        run: |
          cat > public/ucfr-brand.js <<'EOF'
          (() => {
            'use strict';

            const LOGO_PATH = '/assets/ucfr-logo.png?v=5';

            function updateLogos(root = document) {
              root.querySelectorAll?.('img[src*="ucfr-logo."]').forEach((image) => {
                if (image.getAttribute('src') !== LOGO_PATH) image.setAttribute('src', LOGO_PATH);
                image.hidden = false;
                image.style.opacity = '1';
                image.style.visibility = 'visible';
              });

              root.querySelectorAll?.('link[rel~="icon"], link[rel="apple-touch-icon"]').forEach((link) => {
                link.setAttribute('href', LOGO_PATH);
                link.setAttribute('type', 'image/png');
              });
            }

            function apply() {
              updateLogos();
              window.UCFRMemberCards = window.CAFRMemberCards || window.UCFRMemberCards;
            }

            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', apply, { once: true });
            else apply();
            window.setTimeout(apply, 300);
          })();
          EOF

      - name: Replace theme logic
        shell: bash
        run: |
          cat > public/theme-toggle.js <<'EOF'
          (() => {
            'use strict';

            const STORAGE_KEY = 'ucfr-theme';
            const LEGACY_KEY = 'cafr-theme';
            const DARK = 'dark';
            const LIGHT = 'light';

            function storedTheme() {
              const saved = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_KEY);
              if (saved === DARK || saved === LIGHT) return saved;
              return window.matchMedia?.('(prefers-color-scheme: dark)').matches ? DARK : LIGHT;
            }

            function isEnglish() {
              return document.documentElement.lang === 'en';
            }

            function updateButtons(theme) {
              const dark = theme === DARK;
              document.querySelectorAll('[data-theme-toggle]').forEach((button) => {
                const label = isEnglish()
                  ? (dark ? 'Light mode' : 'Dark mode')
                  : (dark ? 'Světlý režim' : 'Tmavý režim');
                button.innerHTML = `<span class="theme-toggle-icon" aria-hidden="true">${dark ? '☀' : '☾'}</span><span class="theme-toggle-label">${label}</span>`;
                button.setAttribute('aria-label', label);
                button.setAttribute('title', label);
                button.setAttribute('aria-pressed', String(dark));
              });
            }

            function applyTheme(theme, persist = true) {
              const next = theme === DARK ? DARK : LIGHT;
              document.documentElement.classList.toggle('theme-dark', next === DARK);
              document.documentElement.classList.toggle('theme-light', next === LIGHT);
              document.documentElement.dataset.theme = next;
              if (persist) {
                localStorage.setItem(STORAGE_KEY, next);
                localStorage.removeItem(LEGACY_KEY);
              }
              const meta = document.querySelector('meta[name="theme-color"]');
              if (meta) meta.content = next === DARK ? '#07111f' : '#0b2a55';
              updateButtons(next);
            }

            function toggleTheme() {
              applyTheme(document.documentElement.classList.contains('theme-dark') ? LIGHT : DARK);
            }

            function createButton(id, className) {
              const button = document.createElement('button');
              button.id = id;
              button.type = 'button';
              button.className = `theme-toggle-btn ${className}`;
              button.dataset.themeToggle = 'true';
              button.addEventListener('click', toggleTheme);
              return button;
            }

            function addHomepageButton() {
              const actions = document.querySelector('.topbar .actions');
              if (!actions) return false;
              if (!document.getElementById('siteThemeToggle')) actions.prepend(createButton('siteThemeToggle', 'site-theme-toggle'));
              updateButtons(storedTheme());
              return true;
            }

            function addDashboardButton() {
              const sidebar = document.querySelector('.dashboard-sidebar');
              if (!sidebar) return false;
              if (!document.getElementById('dashboardThemeToggle')) {
                const button = createButton('dashboardThemeToggle', 'dashboard-theme-toggle');
                const top = document.querySelector('.dashboard-mobile-top');
                if (top) top.insertBefore(button, top.querySelector('.dashboard-mobile-logout'));
                else sidebar.insertBefore(button, sidebar.querySelector('.dashboard-nav'));
              }
              updateButtons(storedTheme());
              return true;
            }

            applyTheme(storedTheme(), false);

            if (!addHomepageButton() || !addDashboardButton()) {
              const observer = new MutationObserver(() => {
                const homeReady = addHomepageButton();
                const dashboardReady = addDashboardButton();
                if (homeReady && dashboardReady) observer.disconnect();
              });
              observer.observe(document.body, { childList: true, subtree: true });
              window.setTimeout(() => observer.disconnect(), 12000);
            }
          })();
          EOF

          cat > public/theme-toggle.css <<'EOF'
          :root { color-scheme: light; }
          html.theme-light {
            color-scheme: light;
            --ucfr-page: #f4f7fb;
            --ucfr-surface: #ffffff;
            --ucfr-surface-2: #eef3f8;
            --ucfr-text: #172033;
            --ucfr-muted: #647084;
            --ucfr-border: #dce4ed;
            --ucfr-header: rgba(255,255,255,.97);
            --ucfr-shadow: 0 16px 38px rgba(7,27,49,.10);
          }
          html.theme-dark {
            color-scheme: dark;
            --ucfr-page: #07111f;
            --ucfr-surface: #0f2036;
            --ucfr-surface-2: #132a45;
            --ucfr-text: #edf4ff;
            --ucfr-muted: #b8c6d8;
            --ucfr-border: rgba(255,255,255,.14);
            --ucfr-header: rgba(7,17,31,.97);
            --ucfr-shadow: 0 18px 45px rgba(0,0,0,.30);
          }

          body, .portal-body {
            background: var(--ucfr-page) !important;
            color: var(--ucfr-text) !important;
            transition: background-color .2s ease, color .2s ease;
          }

          .topbar {
            background: var(--ucfr-header) !important;
            border-color: var(--ucfr-border) !important;
            box-shadow: 0 6px 22px rgba(7,27,49,.08);
          }
          .brand, nav a, .ghost, .lang, .menu { color: var(--ucfr-text) !important; }
          .brand img {
            display: block !important;
            opacity: 1 !important;
            visibility: visible !important;
            object-fit: contain !important;
            background: transparent !important;
            border-radius: 0 !important;
            filter: drop-shadow(0 4px 8px rgba(7,27,49,.18));
          }
          html.theme-dark .brand img { filter: drop-shadow(0 4px 10px rgba(255,255,255,.10)); }

          .theme-toggle-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-height: 40px;
            padding: 9px 13px;
            border: 1px solid var(--ucfr-border);
            border-radius: 999px;
            background: var(--ucfr-surface);
            color: var(--ucfr-text);
            font: inherit;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 14px rgba(7,27,49,.08);
          }
          .theme-toggle-btn:hover { transform: translateY(-1px); }
          .theme-toggle-icon { width: 18px; font-size: 18px; line-height: 1; }

          .section, .membership, .education-hub, .documents-section, .governance,
          .detail-section, .protection-detail, .dashboard-main {
            background: var(--ucfr-page) !important;
            color: var(--ucfr-text) !important;
          }
          .detail-section.detail-alt, .governance, .education-hub, .protection-detail {
            background: var(--ucfr-surface-2) !important;
          }

          .card, .test-mode-card, .membership-card, .news article, .quiz-preview,
          .detail-grid div, .detail-section ul, .membership-rules article,
          .dashboard-panel, .verify-card, .document-card, .seminar-card, .fee-card,
          .legal-request-card, .notification-item, .incident-history-item,
          .admin-member-card, .admin-question, .admin-create, .admin-stats article,
          .modal-box {
            background: var(--ucfr-surface) !important;
            color: var(--ucfr-text) !important;
            border-color: var(--ucfr-border) !important;
            box-shadow: var(--ucfr-shadow);
          }

          .section-head h2, .card h3, .test-mode-card h3, .membership h2,
          .news h3, .detail-intro h2, .detail-section h2, .dashboard-panel h2,
          .dashboard-panel h3, .documents-section h2 {
            color: var(--ucfr-text) !important;
          }
          p, .muted, .section-head p, .card p, .test-mode-card p,
          .membership p, .news p, .detail-intro p, .detail-section p,
          .documents-section p, .dashboard-panel p {
            color: var(--ucfr-muted) !important;
          }

          input, select, textarea, .answers button, .test-answers button {
            background: var(--ucfr-surface) !important;
            color: var(--ucfr-text) !important;
            border-color: var(--ucfr-border) !important;
          }
          input::placeholder, textarea::placeholder { color: var(--ucfr-muted) !important; opacity: .85; }

          html.theme-dark nav.open, html.theme-dark .topbar nav { background: #0f2036 !important; }
          html.theme-light nav.open, html.theme-light .topbar nav { background: #ffffff !important; }

          html.theme-dark .member-card,
          html.theme-dark .incident,
          html.theme-dark .hero,
          html.theme-dark footer {
            color: #ffffff !important;
          }
          html.theme-dark .member-card h3,
          html.theme-dark .member-card p,
          html.theme-dark .member-card small { color: #ffffff !important; }

          @media (max-width: 720px) {
            .theme-toggle-btn { min-width: 42px; padding: 9px 10px; }
            .theme-toggle-label { display: none; }
            .brand img { width: 62px !important; height: 76px !important; }
          }
          EOF

      - name: Verify and commit
        shell: bash
        run: |
          node --check public/ucfr-brand.js
          node --check public/theme-toggle.js
          npm ci
          npm run build
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm .github/workflows/fix-logo-theme-render.yml
          git add -A
          git commit -m "Fix visible logo, rebuild themes and rename Render service"
          git push
