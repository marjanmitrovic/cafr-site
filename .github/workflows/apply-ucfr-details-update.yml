name: Apply UČFR details update

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-ucfr-details-update.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply requested changes
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          root = Path('.')
          workflow = root / '.github/workflows/apply-ucfr-details-update.yml'

          server_path = root / 'server/server.js'
          server = server_path.read_text(encoding='utf-8')
          if "'unierozhodcich@gmail.com'," not in server:
              marker = "  'marapleskac@gmail.com',\n"
              if marker not in server:
                  raise SystemExit('Admin email marker not found')
              server = server.replace(
                  marker,
                  marker + "  'unierozhodcich@gmail.com',\n",
                  1,
              )
          server = server.replace(
              "process.env.ASSOCIATION_ICO || 'bude doplněno'",
              "process.env.ASSOCIATION_ICO || '24417513'",
          )
          server_path.write_text(server, encoding='utf-8')

          main_path = root / 'src/main.js'
          main = main_path.read_text(encoding='utf-8')
          main = main.replace("'PETR TLUSTOHLAVY'", "'PETR ROZHODČÍ'")
          main = main.replace('IČO: bude doplněno', 'IČO: 24417513')

          youtube_url = 'https://youtube.com/@refacademy?si=nvtPkzVsGe30KaRA'
          if youtube_url not in main:
              marker = '''          <article class="test-mode-card">
            <div class="test-mode-icon">📊</div>'''
              video_card = '''          <article class="test-mode-card">
            <div class="test-mode-icon">🎥</div>
            <h3>${lang === 'cs' ? 'Video analýzy' : 'Video analysis'}</h3>
            <p>${lang === 'cs' ? 'Rozbory herních situací a rozhodnutí rozhodčích.' : 'Breakdowns of match situations and refereeing decisions.'}</p>
            <a
              class="secondary dark video-analysis-link"
              href="https://youtube.com/@refacademy?si=nvtPkzVsGe30KaRA"
              target="_blank"
              rel="noopener noreferrer"
            >
              ${lang === 'cs' ? 'Otevřít Ref Academy' : 'Open Ref Academy'}
            </a>
          </article>

'''
              if marker not in main:
                  raise SystemExit('Education card marker not found')
              main = main.replace(marker, video_card + marker, 1)

          documents_pattern = re.compile(
              r'    <section class="documents-section" id="documents">.*?    </section>\n\n    <footer id="contact">',
              re.S,
          )
          documents_replacement = '''    <section class="documents-section" id="documents">
      <div>
        <span class="section-label">DOCUMENTS</span>
        <h2>${lang === 'cs' ? 'Oficiální dokumenty UČFR' : 'Official UČFR documents'}</h2>
        <p>
          ${
            lang === 'cs'
              ? 'Ověřené údaje spolku a veřejné listiny vedené Ministerstvem spravedlnosti České republiky.'
              : 'Verified association details and public documents maintained by the Ministry of Justice of the Czech Republic.'
          }
        </p>
      </div>

      <div class="document-links">
        <a
          class="document-link"
          href="https://or.justice.cz/ias/ui/rejstrik-firma.vysledky?subjektId=1306981&typ=PLATNY"
          target="_blank"
          rel="noopener noreferrer"
        >
          📄 ${lang === 'cs' ? 'Veřejný rejstřík spolku' : 'Public register entry'}
        </a>
        <a
          class="document-link"
          href="https://or.justice.cz/ias/ui/vypis-sl-detail?dokument=89888399&subjektId=1306981&spis=1476835"
          target="_blank"
          rel="noopener noreferrer"
        >
          📄 ${lang === 'cs' ? 'Sbírka listin – dokument 89888399' : 'Collection of documents – document 89888399'}
        </a>
      </div>
    </section>

    <footer id="contact">'''
          main, count = documents_pattern.subn(documents_replacement, main, count=1)
          if count != 1:
              raise SystemExit(f'Documents section replacement count: {count}')
          main_path.write_text(main, encoding='utf-8')

          style_path = root / 'src/style.css'
          style = style_path.read_text(encoding='utf-8')
          extra_css = '''

.document-links{display:flex;flex-direction:column;gap:12px;min-width:min(100%,430px)}
.document-links .document-link{white-space:normal;justify-content:flex-start}
.video-analysis-link{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;margin-top:10px}
@media(max-width:720px){.document-links{width:100%;min-width:0}.document-links .document-link{width:100%;justify-content:center}}
'''
          if '.video-analysis-link{' not in style:
              style += extra_css
          style_path.write_text(style, encoding='utf-8')

          logo_path = root / 'public/assets/ucfr-logo.svg'
          logo_path.write_text('''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">UČFR</title>
  <desc id="desc">Znak Unie českých fotbalových rozhodčích</desc>
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071f46"/>
      <stop offset="1" stop-color="#0b4ea2"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dce6f2"/>
    </linearGradient>
  </defs>
  <path d="M256 18 452 86v154c0 119-72 207-196 254C132 447 60 359 60 240V86Z" fill="url(#shield)" stroke="#06172f" stroke-width="12" stroke-linejoin="round"/>
  <path d="M256 48 420 105v132c0 98-57 172-164 216C149 409 92 335 92 237V105Z" fill="url(#silver)" stroke="#ffffff" stroke-width="6" stroke-linejoin="round"/>
  <path d="M92 105 256 48l164 57v54L92 221Z" fill="#d71920"/>
  <path d="M92 170 420 105v54L92 275Z" fill="#1c5aa6" opacity="0.96"/>
  <path d="M92 207 420 142v24L92 296Z" fill="#ffffff"/>
  <circle cx="256" cy="251" r="104" fill="#ffffff" stroke="#082f6d" stroke-width="10"/>
  <g transform="translate(256 225)" fill="none" stroke="#082f6d" stroke-linecap="round" stroke-linejoin="round">
    <circle r="54" stroke-width="8"/>
    <path d="M0-23 22-7 14 19h-28L-22-7Z" fill="#082f6d" stroke-width="5"/>
    <path d="M0-54V-23M51-17 22-7M32 44 14 19M-32 44-14 19M-51-17-22-7" stroke-width="7"/>
  </g>
  <g transform="translate(174 294)">
    <path d="M18 14h100c20 0 36 16 36 36v8H96l-18 23H26C12 81 0 69 0 55V32c0-10 8-18 18-18Z" fill="#082f6d"/>
    <circle cx="31" cy="48" r="11" fill="#ffffff"/>
    <path d="M154 44h42c12 0 22 10 22 22s-10 22-22 22h-34" fill="none" stroke="#082f6d" stroke-width="14" stroke-linecap="round"/>
  </g>
  <path d="M112 368h288v68c-38 25-86 46-144 68-58-22-106-43-144-68Z" fill="#082f6d"/>
  <text x="256" y="426" text-anchor="middle" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="67" font-weight="800" letter-spacing="4">UČFR</text>
</svg>
''', encoding='utf-8')

          card_path = root / 'public/cards/card-template.svg'
          card_path.write_text('''<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1011" height="638" viewBox="0 0 1011 638" role="img" aria-labelledby="title desc">
  <title id="title">UČFR členský průkaz</title>
  <desc id="desc">CR80 členský průkaz Unie českých fotbalových rozhodčích</desc>
  <defs>
    <clipPath id="cardClip"><rect width="1011" height="638" rx="38" ry="38"/></clipPath>
    <linearGradient id="navyGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#082f6d"/><stop offset="1" stop-color="#0b4ea2"/></linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#081c3a" flood-opacity="0.2"/></filter>
  </defs>
  <g filter="url(#shadow)"><rect width="1011" height="638" rx="38" fill="#ffffff"/></g>
  <g clip-path="url(#cardClip)">
    <rect width="1011" height="286" fill="url(#navyGradient)"/>
    <g opacity="0.12" fill="none" stroke="#ffffff" stroke-width="3">
      <path d="M-40 76 C160 10 270 154 470 82 S780 24 1060 112"/>
      <path d="M-55 126 C165 60 295 194 486 130 S785 74 1065 160"/>
      <path d="M-60 184 C155 116 306 242 500 182 S802 130 1075 214"/>
      <path d="M-50 236 C158 174 320 288 518 232 S824 190 1074 264"/>
    </g>
    <polygon points="0,278 1011,238 1011,286 0,326" fill="#ffffff" opacity="0.94"/>
    <polygon points="0,286 1011,246 1011,258 0,298" fill="#d71920"/>
    <polygon points="0,298 1011,258 1011,266 0,306" fill="#ffffff"/>
    <polygon points="0,306 1011,266 1011,274 0,314" fill="#1c5aa6"/>
    <image href="{{LOGO}}" x="42" y="30" width="154" height="166" preserveAspectRatio="xMidYMid meet"/>
    <text x="216" y="105" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="86" font-weight="800" letter-spacing="2">UČFR</text>
    <text x="220" y="151" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="1.5">UNIE ČESKÝCH</text>
    <text x="220" y="185" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="1.15">FOTBALOVÝCH ROZHODČÍCH</text>
    <rect x="220" y="207" width="66" height="7" rx="3.5" fill="#ffffff"/><rect x="292" y="207" width="66" height="7" rx="3.5" fill="#d71920"/><rect x="364" y="207" width="66" height="7" rx="3.5" fill="#2c73c5"/>
    <text x="54" y="358" fill="#0a3979" font-family="Montserrat, Arial, sans-serif" font-size="31" font-weight="800" letter-spacing="1.1">ČLENSKÝ PRŮKAZ</text>
    <text x="54" y="407" fill="#4771a7" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.5">JMÉNO A PŘÍJMENÍ</text>
    <text x="54" y="456" fill="#102f5b" font-family="Montserrat, Arial, sans-serif" font-size="{{NAME_FONT_SIZE}}" font-weight="800">{{NAME}}</text>
    <line x1="54" y1="474" x2="646" y2="474" stroke="#d6dfeb" stroke-width="2"/>
    <text x="54" y="511" fill="#4771a7" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.5">ČLENSKÉ ID</text>
    <text x="54" y="548" fill="#102f5b" font-family="Montserrat, Arial, sans-serif" font-size="27" font-weight="800" letter-spacing="0.7">{{CARD_NUMBER}}</text>
    <text x="377" y="511" fill="#4771a7" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.5">STATUS</text>
    <circle cx="388" cy="542" r="8" fill="{{STATUS_COLOR}}"/><text x="406" y="550" fill="{{STATUS_COLOR}}" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="800">{{STATUS}}</text>
    <rect x="713" y="337" width="244" height="244" rx="24" fill="#ffffff" stroke="#d9e2ed" stroke-width="3"/>
    <image href="{{QR}}" x="731" y="355" width="208" height="208" preserveAspectRatio="xMidYMid meet"/>
    <text x="835" y="603" text-anchor="middle" fill="#6c809a" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="0.9">OVĚŘENÍ ČLENSTVÍ</text>
    <text x="54" y="607" fill="#8a9aaf" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.6">UNIE ČESKÝCH FOTBALOVÝCH ROZHODČÍCH • {{ISSUED}}</text>
  </g>
  <rect x="1.5" y="1.5" width="1008" height="635" rx="36.5" fill="none" stroke="#dce3ed" stroke-width="3"/>
</svg>
''', encoding='utf-8')

          draft_pdf = root / 'public/documents/Stanovy_CAFR_navrh.pdf'
          if draft_pdf.exists():
              draft_pdf.unlink()

          if workflow.exists():
              workflow.unlink()
          PY

      - name: Validate source and build
        run: |
          node --check server/server.js
          node --check src/main.js
          node --check public/member-card-system.js
          node --check public/simple-member-card.js
          npm ci
          npm run test:cards
          npm run build

      - name: Commit requested changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Update UČFR details documents and member card"
          git push
