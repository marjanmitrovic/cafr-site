name: Main build check

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check browser and email scripts
        run: |
          node --check public/member-card-system.js
          node --check public/simple-member-card.js
          node --check public/ucfr-brand.js
          node --check public/ucfr-details.js
          node --check server/ucfr-details-preload.js
      - name: Validate member card template
        run: npm run test:cards
      - name: Build
        run: npm run build
