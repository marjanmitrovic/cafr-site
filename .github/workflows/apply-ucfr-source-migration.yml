name: Apply UČFR source migration

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-ucfr-source-migration.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace the old public identity in source files
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          workflow = root / '.github/workflows/apply-ucfr-source-migration.yml'
          replacements = [
              ('ČESKÁ ASOCIACE FOTBALOVÝCH ROZHODČÍCH', 'UNIE ČESKÝCH FOTBALOVÝCH ROZHODČÍCH'),
              ('Česká asociace fotbalových rozhodčích', 'Unie českých fotbalových rozhodčích'),
              ('Czech Association of Football Referees', 'Union of Czech Football Referees'),
              ('ČESKÁ ASOCIACE', 'UNIE ČESKÝCH'),
              ('Česká asociace', 'Unie českých'),
              ('ČAFR', 'UČFR'),
              ('CAFR-', 'UCFR-'),
              ('/assets/cafr-logo.png', '/assets/ucfr-logo.svg'),
          ]
          text_suffixes = {'.js', '.mjs', '.html', '.svg', '.json', '.md', '.css', '.yml', '.yaml', '.txt'}

          for path in root.rglob('*'):
              if not path.is_file() or '.git' in path.parts or path == workflow:
                  continue
              if path.suffix.lower() not in text_suffixes:
                  continue
              try:
                  original = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              updated = original
              for old, new in replacements:
                  updated = updated.replace(old, new)
              if updated != original:
                  path.write_text(updated, encoding='utf-8')

          server_path = root / 'server/server.js'
          server = server_path.read_text(encoding='utf-8')
          old_declaration = "const ADMIN_NOTIFY_EMAIL = process.env.ADMIN_NOTIFY_EMAIL || process.env.ADMIN_EMAIL || 'marjan.posao@gmail.com';"
          new_declaration = """const configuredAdminNotifyEmails = String(process.env.ADMIN_NOTIFY_EMAIL || process.env.ADMIN_EMAIL || '')
            .split(',')
            .map((email) => email.trim().toLowerCase())
            .filter(Boolean);
          const ADMIN_NOTIFY_EMAILS = [...new Set([
            ...configuredAdminNotifyEmails,
            'marjan.posao@gmail.com',
            'marapleskac@gmail.com',
          ])];"""
          if old_declaration not in server:
              raise SystemExit('Expected ADMIN_NOTIFY_EMAIL declaration was not found.')
          server = server.replace(old_declaration, new_declaration, 1)
          if 'to: ADMIN_NOTIFY_EMAIL,' not in server:
              raise SystemExit('Expected sendAdminEmail recipient was not found.')
          server = server.replace('to: ADMIN_NOTIFY_EMAIL,', 'to: ADMIN_NOTIFY_EMAILS,', 1)
          server_path.write_text(server, encoding='utf-8')

          package_path = root / 'package.json'
          package = json.loads(package_path.read_text(encoding='utf-8'))
          package['scripts']['start:production'] = 'node server/server.js'
          package['scripts']['start:api'] = 'node --env-file=.env server/server.js'
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          preload = root / 'server/ucfr-email-preload.js'
          if preload.exists():
              preload.unlink()

          if workflow.exists():
              workflow.unlink()
          PY

      - name: Validate source and build
        run: |
          node --check server/server.js
          node --check public/member-card-system.js
          node --check public/simple-member-card.js
          node --check public/ucfr-brand.js
          npm ci
          npm run build

      - name: Commit migrated source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Complete UČFR source rebrand and dual admin email routing"
          git push
