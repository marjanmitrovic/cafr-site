name: Finalize stable UČFR source

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/finalize-stable-ucfr-source.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move public updates into the main source
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          main_path = Path('src/main.js')
          main = main_path.read_text(encoding='utf-8')

          main = main.replace('/assets/ucfr-logo.png?v=5', '/assets/ucfr-logo.png?v=6')
          main = main.replace("'PETR TLUSTOHLAVY'", "'PETR ROZHODČÍ'")
          main = main.replace('IČO: bude doplněno', 'IČO: 24417513')

          youtube_url = 'https://youtube.com/@refacademy?si=nvtPkzVsGe30KaRA'
          if youtube_url not in main:
              marker = '''          <article class="test-mode-card">
            <div class="test-mode-icon">📊</div>'''
              video_card = '''          <article class="test-mode-card ucfr-video-analysis-card">
            <div class="test-mode-icon">🎥</div>
            <h3>${lang === 'cs' ? 'Video analýzy' : 'Video analysis'}</h3>
            <p>${lang === 'cs' ? 'Rozbory herních situací a rozhodnutí rozhodčích.' : 'Breakdowns of match situations and refereeing decisions.'}</p>
            <a
              class="secondary dark video-analysis-link"
              href="https://youtube.com/@refacademy?si=nvtPkzVsGe30KaRA"
              target="_blank"
              rel="noopener noreferrer"
            >
              ${lang === 'cs' ? 'Otevřít Ref Academy' : 'Open Ref Academy'}
            </a>
          </article>

'''
              if marker not in main:
                  raise SystemExit('Video insertion marker not found')
              main = main.replace(marker, video_card + marker, 1)

          documents_pattern = re.compile(
              r'    <section class="documents-section" id="documents">.*?    </section>\n\n    <footer id="contact">',
              re.S,
          )
          documents_replacement = '''    <section class="documents-section" id="documents">
      <div>
        <span class="section-label">DOCUMENTS</span>
        <h2>${lang === 'cs' ? 'Oficiální dokumenty UČFR' : 'Official UČFR documents'}</h2>
        <p>
          ${
            lang === 'cs'
              ? 'Ověřené údaje spolku a veřejné listiny vedené Ministerstvem spravedlnosti České republiky.'
              : 'Verified association details and public documents maintained by the Ministry of Justice of the Czech Republic.'
          }
        </p>
      </div>

      <div class="document-links">
        <a
          class="document-link"
          href="https://or.justice.cz/ias/ui/rejstrik-firma.vysledky?subjektId=1306981&typ=PLATNY"
          target="_blank"
          rel="noopener noreferrer"
        >
          📄 ${lang === 'cs' ? 'Veřejný rejstřík spolku' : 'Public register entry'}
        </a>
        <a
          class="document-link"
          href="https://or.justice.cz/ias/ui/vypis-sl-detail?dokument=89888399&subjektId=1306981&spis=1476835"
          target="_blank"
          rel="noopener noreferrer"
        >
          📄 ${lang === 'cs' ? 'Sbírka listin – dokument 89888399' : 'Collection of documents – document 89888399'}
        </a>
      </div>
    </section>

    <footer id="contact">'''
          main, count = documents_pattern.subn(documents_replacement, main, count=1)
          if count != 1:
              raise SystemExit(f'Documents replacement count: {count}')

          main_path.write_text(main, encoding='utf-8')

          index_path = Path('index.html')
          index = index_path.read_text(encoding='utf-8')
          index = re.sub(r'\n\s*<script src="/ucfr-details\.js\?v=\d+" defer></script>', '', index)
          index_path.write_text(index, encoding='utf-8')
          PY

      - name: Validate source and build
        run: |
          node --check public/theme-toggle.js
          node --check public/ucfr-details.js
          node --check src/main.js
          npm ci
          npm run build

      - name: Commit final source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/finalize-stable-ucfr-source.yml
          git add src/main.js index.html .github/workflows/finalize-stable-ucfr-source.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Move UČFR content into stable source and remove runtime patch"
          git push origin main
