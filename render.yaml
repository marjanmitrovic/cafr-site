services:
  - type: web
    name: ucfr
    env: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm install --no-audit --no-fund && npm run render:build
    startCommand: npm run start:production
    # Check the static homepage instead of /api/health, because that API route
    # runs a database query and would keep the Neon compute endpoint awake.
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: TOKEN_SECRET
        sync: false
      - key: ADMIN_EMAIL
        value: admin@cafr.cz
      - key: ADMIN_PASSWORD
        sync: false
      - key: WEB_ORIGIN
        value: https://ucfr.onrender.com
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_NOTIFY_EMAIL
        value: marjan.posao@gmail.com,marapleskac@gmail.com,unierozhodcich@gmail.com
      - key: ASSOCIATION_ICO
        value: "24417513"
      - key: EMAIL_DISABLED
        value: "false"
